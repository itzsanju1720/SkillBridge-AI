<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Career Roadmap</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:600px;
background:#1e293b;
padding:40px;
border-radius:20px;
color:white;
text-align:center;
}

h1{
margin-bottom:20px;
color:#38bdf8;
}

select{
width:100%;
padding:15px;
margin:20px 0;
border:none;
border-radius:10px;
font-size:16px;
}

button{
padding:15px 35px;
background:#38bdf8;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0284c7;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Career Roadmap Generator</h1>

<form method="POST">

<select name="career" required>

<option value="">Choose Career</option>

<option>AI Engineer</option>

<option>Machine Learning Engineer</option>

<option>Data Scientist</option>

<option>Web Developer</option>

<option>Backend Developer</option>

<option>Frontend Developer</option>

<option>Cyber Security Engineer</option>

<option>Cloud Engineer</option>

</select>

<button>

Generate Roadmap

</button>

</form>

</div>

</body>

</html>
