<!DOCTYPE html>
<html>
<head>

<title>AI Career Mentor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:750px;
background:#1e293b;
padding:40px;
border-radius:20px;
color:white;
}

h1{
color:#38bdf8;
margin-bottom:25px;
}

textarea{
width:100%;
height:180px;
padding:15px;
font-size:16px;
border:none;
border-radius:10px;
resize:none;
}

button{
margin-top:20px;
padding:15px 35px;
background:#38bdf8;
border:none;
border-radius:10px;
font-size:18px;
color:white;
cursor:pointer;
}

button:hover{
background:#0284c7;
}

</style>

</head>

<body>

<div class="box">

<h1>🤖 AI Career Mentor</h1>

<form method="POST">

<textarea
name="question"
placeholder="Ask anything about career..."
required></textarea>

<button>

Ask AI

</button>

</form>

</div>

</body>
</html>
