<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkillBridge AI | Register</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.register-box{
    width:420px;
    background:#1e293b;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(56,189,248,.25);
}

h1{
    text-align:center;
    color:#38bdf8;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
    font-size:15px;
}

input:focus{
    outline:2px solid #38bdf8;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0284c7;
}

p{
    text-align:center;
    color:white;
    margin-top:18px;
}

a{
    color:#38bdf8;
    text-decoration:none;
}

.error{
    color:red;
    text-align:center;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="register-box">

<h1>Create Account</h1>

<form method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Register
</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<p>
Already have an account?
<a href="/login">Login</a>
</p>

</div>

</body>
</html>
