<!DOCTYPE html>
<html>

<head>

<title>Report History</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
padding:40px;
}

table{

width:100%;
border-collapse:collapse;
margin-top:30px;

}

th,td{

padding:15px;
border:1px solid #334155;

}

th{

background:#1e293b;

}

tr{

background:#172033;

}

h1{

color:#38bdf8;

}

a{

color:#38bdf8;

text-decoration:none;

}

</style>

</head>

<body>

<h1>📄 Resume Analysis History</h1>

<table>

<tr>

<th>ID</th>

<th>Resume</th>

<th>AI Report</th>

</tr>

{% for report in reports %}

<tr>

<td>{{report.id}}</td>

<td>{{report.filename}}</td>

<td>
<details>
<summary>View</summary>

<pre style="white-space:pre-wrap;color:white;">

{{report.result}}

</pre>

</details>

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
