<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillBridge AI | Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:420px;
    background:#1e293b;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(56,189,248,.25);
}

.login-box h1{
    text-align:center;
    margin-bottom:30px;
    color:#38bdf8;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
    font-size:15px;
}

.input-box input:focus{
    outline:2px solid #38bdf8;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0284c7;
}

.signup{
    margin-top:20px;
    text-align:center;
}

.signup a{
    color:#38bdf8;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<h1>SkillBridge AI</h1>

<form method="POST">

<div class="input-box">
<label>Email</label>
<input type="email"
       name="email"
       placeholder="Enter your email"
       required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password"
       name="password"
       placeholder="Enter your password"
       required>
</div>

<button type="submit">
Login
</button>
{% if error %}
<p style="color:red; text-align:center; margin-top:15px;">
    {{ error }}
</p>
{% endif %}

<div class="signup">
<p>New User?
<a href="/">Back to Home</a>
</p>
</div>

</form>

</div>

</body>
</html>
