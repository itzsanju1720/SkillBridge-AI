<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.box{
background:#1e293b;
padding:40px;
border-radius:15px;
width:400px;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}
button{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}
a{
color:#38bdf8;
}
</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form method="POST">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button>Create Account</button>

</form>

{% if error %}
<p style="color:red">{{error}}</p>
{% endif %}

<p>
Already have an account?
<a href="/login">Login</a>
</p>

</div>

</body>
</html>
